name: Daily Critical Portfolio Alerts

on:
  schedule:
    # GitHub cron is UTC. 15:00 UTC ≈ 18:00 IDT / 17:00 IST → email typically
    # arrives in the evening Israel time.
    - cron: '0 15 * * 1-5'  # 15:00 UTC weekdays (Mon–Fri)
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-critical-alerts:
    runs-on: ubuntu-latest
    name: Check for Critical Portfolio Actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # cuts minutes off every daily run

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create portfolio.json from secret
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
        run: |
          if [ -n "$PORTFOLIO_JSON" ]; then
            echo "$PORTFOLIO_JSON" > portfolio.json
          else
            echo "::error::PORTFOLIO_JSON secret is not set — refusing to run alerts on an empty portfolio."
            exit 1
          fi

      # Email credentials are passed per-step below; never exported to
      # $GITHUB_ENV (that made the password ambient for every later step).

      - name: Check 30-day analyze reminder
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT || secrets.EMAIL_SENDER }}
        run: |
          python send_analyze_reminder.py
        continue-on-error: true

      - name: Run Portfolio Analysis (informational artifact)
        env:
          ANALYZE_READONLY: "1"
        run: |
          echo "📊 Running portfolio analysis..."
          python portfolio_analyzer.py > analysis_output.txt 2>&1
        continue-on-error: true  # informational; the alert step below is the one that must succeed

      - name: Run Risk Management Check (informational artifact)
        run: |
          echo "🛡️ Checking portfolio risk..."
          python -c "from risk_manager import RiskManager; rm = RiskManager(); rm.print_risk_report()" > risk_output.txt 2>&1
        continue-on-error: true

      - name: Run Critical Alert Check
        env:
          ANALYZE_READONLY: "1"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT || secrets.EMAIL_SENDER }}
        run: |
          echo "⚠️ Checking for critical alerts..."
          python critical_alert.py
        # No continue-on-error: a crash here must fail the workflow visibly.
        # (critical_alert exits 0 whether or not alerts were found; non-zero
        # means the pipeline itself broke.)

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-analysis-results
          path: |
            analysis_output.txt
            risk_output.txt
          retention-days: 7

      - name: Reminder
        if: always()
        run: |
          echo "ℹ️ Recommendations are never auto-applied. After you execute trades"
          echo "   at your broker, run locally: make analyze (confirm trades), then"
          echo "   make update-secret to sync PORTFOLIO_JSON for the next run."
